name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release zip
        run: |
          zip -r gf-user-journey.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".claude/*" \
            -x "CLAUDE.md" \
            -x ".DS_Store" \
            -x "*.zip" \
            -x "node_modules/*" \
            -x "vendor/*" \
            -x "composer.json" \
            -x "composer.lock" \
            -x "package.json" \
            -x "package-lock.json" \
            -x "eslint.config.mjs" \
            -x ".phpcs.xml.dist" \
            -x ".gitignore" \
            -x "build-zip.sh" \
            -x "includes/plugin-update-checker/README.md" \
            -x "includes/plugin-update-checker/composer.json" \
            -x "includes/plugin-update-checker/license.txt"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: gf-user-journey.zip
          generate_release_notes: true
